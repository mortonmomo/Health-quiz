<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>健康自我檢測｜合併去重版</title>
  <style>
    :root {
      --bg: #f6f8f5;
      --panel: #fff;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d9e2dc;
      --brand: #28745a;
      --brand-dark: #1f5d48;
      --brand-soft: #e5f4ed;
      --warn: #a55418;
      --danger: #b42318;
      --shadow: 0 14px 40px rgba(30, 56, 43, 0.10);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(40, 116, 90, 0.13), transparent 28rem),
        linear-gradient(180deg, #f8fbf7 0%, var(--bg) 100%);
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding: 8px 0 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.12;
    }

    .lead {
      max-width: 780px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .summary-chip {
      display: grid;
      gap: 5px;
      min-width: 178px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
    }

    .summary-chip strong { font-size: 24px; }
    .summary-chip span { color: var(--muted); font-size: 13px; }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 8px;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 22px rgba(30, 56, 43, 0.08);
    }

    .progress-text {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: #e7ece8;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--brand);
      transition: width 180ms ease;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .intro,
    .question,
    #result {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: 20px;
      color: var(--muted);
      line-height: 1.75;
    }

    .question {
      display: grid;
      gap: 14px;
      padding: 20px;
    }

    .question.missing {
      border-color: #d98b45;
      box-shadow: 0 0 0 3px rgba(217, 139, 69, 0.14);
    }

    .q-title {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 700;
      line-height: 1.6;
    }

    .q-no {
      min-width: 34px;
      padding: 2px 8px;
      border-radius: 99px;
      color: var(--brand-dark);
      background: var(--brand-soft);
      text-align: center;
      font-size: 13px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .option {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      min-height: 48px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      line-height: 1.5;
      cursor: pointer;
    }

    .option:has(input:checked) {
      border-color: var(--brand);
      background: var(--brand-soft);
      box-shadow: inset 0 0 0 1px var(--brand);
    }

    input[type="radio"] {
      accent-color: var(--brand);
      margin-top: 4px;
    }

    .actions,
    .download-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 8px;
      font: inherit;
      cursor: pointer;
    }

    .primary,
    .secondary {
      padding: 12px 18px;
      font-weight: 700;
    }

    .primary {
      color: #fff;
      background: var(--brand);
    }

    .secondary {
      color: var(--brand-dark);
      border: 1px solid var(--line);
      background: #fff;
    }

    .notice {
      display: none;
      margin: 0;
      color: var(--warn);
      font-weight: 700;
    }

    .notice.show { display: block; }

    #result {
      display: none;
      margin-top: 24px;
      padding: 24px;
    }

    #result.show { display: block; }

    .result-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 18px;
    }

    h2, h3 { margin: 0; }

    .timestamp {
      color: var(--muted);
      font-size: 13px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }

    .result-card {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }

    .score {
      font-size: 34px;
      font-weight: 800;
      color: var(--brand-dark);
    }

    .level {
      display: inline-flex;
      width: fit-content;
      padding: 4px 9px;
      border-radius: 99px;
      background: var(--brand-soft);
      color: var(--brand-dark);
      font-weight: 700;
      font-size: 13px;
    }

    .level.warn { background: #fff1dd; color: var(--warn); }
    .level.danger { background: #fee4e2; color: var(--danger); }

    .result-card p,
    .disclaimer,
    .sources {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .answer-list {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .answer-list h3 { margin-bottom: 12px; }

    .answer-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) minmax(230px, 0.45fr);
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #edf1ed;
      color: var(--muted);
      line-height: 1.55;
    }

    .answer-score {
      display: grid;
      gap: 4px;
      color: var(--ink);
      font-weight: 700;
    }

    .answer-analysis {
      color: var(--muted);
      font-weight: 400;
      font-size: 13px;
    }

    .disclaimer,
    .sources {
      margin-top: 18px;
      padding: 16px;
      border-radius: 8px;
      background: #f8faf8;
      font-size: 14px;
    }

    .danger-box {
      margin: 0 0 14px;
      padding: 16px;
      border-radius: 8px;
      background: #fee4e2;
      color: var(--danger);
      font-weight: 700;
      line-height: 1.7;
    }

    .sources ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    a { color: var(--brand-dark); }

    @media (max-width: 760px) {
      .page { width: min(100% - 22px, 1080px); padding-top: 18px; }
      header { grid-template-columns: 1fr; }
      .answer-row { grid-template-columns: 1fr; gap: 4px; }
      .actions button, .download-actions button { flex: 1; }
      .progress-text { text-align: left; }
    }

    @media print {
      body { background: #fff; }
      .toolbar, form, .download-actions, header .lead, .summary-chip { display: none !important; }
      .page { width: 100%; padding: 0; }
      #result { display: block !important; box-shadow: none; border: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>健康自我檢測｜合併去重版</h1>
        <p class="lead">18題合併去重版，採分項計分：身體與慢性病、睡眠壓力情緒、功能與健康老化，另以第18題做心理安全高優先提醒。</p>
      </div>
      <div class="summary-chip" aria-label="題目總數">
        <strong>18 題</strong>
        <span>全部填完後送出</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="progress-text" id="progressText">已完成 0 / 18</div>
      <div class="progress" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <form id="quizForm" novalidate>
      <div class="intro">本問卷為健康教育用自我檢視，不等於任何官方量表或醫療診斷。若需要正式 BSRS-5 或長者量六力分數，請使用原始題目與原始評分方式。</div>
      <p class="notice" id="notice">還有題目沒填，已幫你標出來了。</p>
      <div id="questions"></div>
      <div class="actions">
        <button class="secondary" type="button" id="resetBtn">清除重填</button>
        <button class="primary" type="submit">送出看結果</button>
      </div>
    </form>

    <section id="result" aria-live="polite"></section>
  </main>

  <script>
    const questions = [
      {
        no: 1,
        text: "你的健康報告或健康存摺中，是否有紅字、異常或需要追蹤的項目？",
        options: [["有，且尚未追蹤或不太懂代表什麼", 1], ["目前都在正常範圍，或已定期追蹤", 0]],
        category: "body",
        aspect: "健檢與慢性病早期發現",
        analysis: "健檢紅字通常代表某些檢查值超出參考範圍或需要追蹤，重點是知道異常項目、程度與是否需要複檢或生活調整。",
        advice: "建議把紅字分成血壓、血糖、血脂、腎功能、肝功能、體位等項目，帶報告詢問醫療人員。"
      },
      {
        no: 2,
        text: "最近是否常睡不好、早上醒來仍像沒睡，或白天容易疲倦想睡？",
        options: [["是，經常如此", 1], ["否，睡醒通常有恢復感", 0]],
        category: "stress",
        aspect: "睡眠品質／疲勞",
        analysis: "睡眠問題可能包含睡眠時間不足、睡眠品質差、失眠、睡眠呼吸中止或壓力造成的睡眠恢復不足。",
        advice: "先檢視固定睡醒時間、睡前螢幕、晚間咖啡因與酒精；若持續影響生活，建議醫療評估。"
      },
      {
        no: 3,
        text: "最近是否常感到緊張不安、工作做不完，或下班／放假後仍難以真正放鬆？",
        options: [["是，經常緊繃或放鬆不下來", 1], ["否，通常能切換並放鬆", 0]],
        category: "stress",
        aspect: "壓力負荷／心理恢復",
        analysis: "長期緊張與無法放鬆常代表壓力恢復不足，可能進一步影響睡眠、注意力、情緒與身體症狀。",
        advice: "可建立下班收尾儀式、關閉工作通知、安排短暫伸展或放鬆練習。"
      },
      {
        no: 4,
        text: "最近是否常心煩、低落、容易動怒，或明顯減少原本有興趣的活動？",
        options: [["是，有上述情形", 1], ["否，沒有明顯出現", 0]],
        category: "stress",
        aspect: "情緒困擾／憂鬱警訊",
        analysis: "情緒低落、煩躁、興趣下降可能是壓力反應，也可能與憂鬱或焦慮相關。",
        advice: "若持續超過兩週、功能受損或出現自傷想法，應儘速尋求心理衛生或醫療協助。"
      },
      {
        no: 5,
        text: "爬樓梯、從椅子起身或連續起立坐下時，是否比以前明顯吃力？",
        options: [["是，明顯吃力；或5次起立坐下超過12秒", 1], ["否，行動與肌力大致穩定", 0]],
        category: "function",
        aspect: "肌力／行動功能",
        analysis: "爬樓梯與椅子起身反映下肢肌力、心肺適能、平衡與行動功能。",
        advice: "可從快走、坐到站、扶牆深蹲、踮腳與平衡訓練開始；若有胸痛、嚴重喘或暈眩，應先就醫。"
      },
      {
        no: 6,
        text: "近一年或最近是否覺得記憶、反應或注意力明顯變差，已影響對話、工作或生活安排？",
        options: [["是，自己或家人有感覺到", 1], ["否，沒有明顯變差", 0]],
        category: "function",
        aspect: "認知／記憶／注意力",
        analysis: "記憶、反應或注意力變差可能和睡眠、壓力、憂鬱、藥物、慢性病或認知退化有關。",
        advice: "記錄發生頻率與情境；若影響用藥、財務、外出、工作或生活安排，建議就醫評估。"
      },
      {
        no: 7,
        text: "最近是否常食慾變差／特別好，或吃完正餐後常昏沉想睡？",
        options: [["是，有明顯食慾或飯後精神變化", 1], ["否，食慾與飯後精神大致穩定", 0]],
        category: "body",
        aspect: "營養／飲食後狀態",
        analysis: "食慾變化可能與壓力、睡眠、疾病、藥物、口腔牙齒、情緒或營養狀態有關。",
        advice: "建議規律三餐，增加蔬菜與優質蛋白質，減少含糖飲料與精製澱粉。"
      },
      {
        no: 8,
        text: "非刻意減重的情況下，過去三個月體重是否減輕3公斤或以上？",
        options: [["是", 1], ["否", 0]],
        category: "body",
        aspect: "營養不良／體重下降",
        analysis: "非刻意體重下降是重要營養與疾病警訊，可能與食慾、吞嚥、口腔、憂鬱、慢性病、藥物或癌症等因素有關。",
        advice: "建議每月量體重並記錄；若非刻意下降，應尋求醫療評估原因。"
      },
      {
        no: 9,
        text: "上個月是否缺少真正放鬆的社交，或因身心／聽力問題減少聚會活動？",
        options: [["是，缺少放鬆社交或因此減少活動", 1], ["否，仍有放鬆且可參與的社交", 0]],
        category: "function",
        aspect: "社交連結／參與",
        analysis: "社交連結與心理健康、生活品質、健康老化有關；若因聽力或情緒問題減少社交，可能形成退縮循環。",
        advice: "可從低壓力、短時間的社交開始，安排每週固定聯繫。"
      },
      {
        no: 10,
        text: "近一年，腰圍是否有悄悄變大，或褲子越來越緊？",
        options: [["是", 1], ["否，腰圍大致穩定", 0]],
        category: "body",
        aspect: "腹部肥胖／代謝風險",
        analysis: "腰圍增加代表腹部脂肪可能增加，與代謝症候群、血壓、血糖與血脂風險相關。",
        advice: "建議定期量腰圍，搭配飲食調整、規律運動與健檢追蹤。"
      },
      {
        no: 11,
        text: "看遠、看近或閱讀是否變吃力，或過去一年未接受眼睛檢查？",
        options: [["是，有視力困難或未檢查", 1], ["否，視力可用且已適當檢查", 0]],
        category: "function",
        aspect: "視力功能／眼睛檢查",
        analysis: "視力變差會影響閱讀、服藥、移動安全與生活參與；未定期檢查可能延後發現眼病變。",
        advice: "建議安排眼科或視力檢查；若突然視力模糊、眼痛或視野缺損，應儘速就醫。"
      },
      {
        no: 12,
        text: "電話、看電視或面對面交談時，是否常聽不清楚、需要對方重複，或音量越開越大？",
        options: [["是", 1], ["否，聽力溝通大致清楚", 0]],
        category: "function",
        aspect: "聽力功能／溝通",
        analysis: "聽力下降會影響溝通、社交參與與安全，也可能增加孤立感。",
        advice: "建議接受聽力檢查，溝通時降低背景噪音、面對面說話，必要時使用助聽器或輔具。"
      },
      {
        no: 13,
        text: "你是否有想像過自己80歲會過著什麼樣的生活，並知道現在可做哪些準備？",
        options: [["沒有，靠感覺在過", 1], ["有，我知道我在做什麼", 0]],
        category: "function",
        aspect: "健康老化／未來生活規劃",
        analysis: "健康老化包含維持功能能力與生活參與；提早想像老年生活，有助於把準備具體化。",
        advice: "可寫下80歲想保有的三件能力，再反推現在每週可以做的行動。"
      },
      {
        no: 14,
        text: "最近六個月內是否生病不只一次，或覺得身體恢復力變差？",
        options: [["是", 1], ["否", 0]],
        category: "body",
        aspect: "身體恢復力／壓力身體化",
        analysis: "近期反覆生病可能與壓力、睡眠不足、生活作息、慢性病控制、免疫狀態或感染暴露有關。",
        advice: "建議檢視睡眠、營養、疫苗、運動與慢性病追蹤；若反覆感染或異常疲倦，應就醫評估。"
      },
      {
        no: 15,
        text: "最近是否經常頭痛、腰痠背痛或身體緊繃不適？",
        options: [["是", 1], ["否", 0]],
        category: "body",
        aspect: "身體症狀／壓力反應",
        analysis: "頭痛、腰痠背痛可能與姿勢、肌肉緊繃、睡眠、壓力或疾病有關。",
        advice: "可從伸展、規律活動、改善坐姿與休息開始；若疼痛劇烈或持續惡化，應就醫。"
      },
      {
        no: 16,
        text: "最近是否經常和別人意見不合，或人際互動變得比較容易衝突？",
        options: [["是", 1], ["否", 0]],
        category: "stress",
        aspect: "人際壓力／情緒調節",
        analysis: "壓力與情緒負荷可能讓人更容易煩躁、反應強烈或與他人衝突。",
        advice: "建議先暫停反應、釐清事實與感受；若衝突頻繁或伴隨情緒失控，建議尋求協助。"
      },
      {
        no: 17,
        text: "最近是否有人說你氣色不太好，或你自己覺得精神狀態明顯變差？",
        options: [["是", 1], ["否", 0]],
        category: "body",
        aspect: "整體狀態／外顯警訊",
        analysis: "氣色不佳是非特異性的外顯訊號，可能與睡眠、壓力、貧血、營養、慢性病或感染有關。",
        advice: "先檢視睡眠、飲食、壓力與活動量；若合併體重下降、喘、頭暈或健檢異常，應就醫評估。"
      },
      {
        no: 18,
        text: "最近一週是否有自殺的想法？",
        options: [["0 完全沒有", 0], ["1 輕微", 1], ["2 中等程度", 2], ["3 厲害", 3], ["4 非常厲害", 4]],
        category: "safety",
        aspect: "自殺風險／立即關懷",
        analysis: "自殺想法是高度優先的心理安全警訊，即使分數很低，也應被認真對待。",
        advice: "請立即告知可信任的人並尋求心理衛生或醫療協助；若有立即危險，請撥打當地緊急電話或前往急診。"
      }
    ];

    const categories = [
      { id: "body", title: "身體與慢性病警訊", max: 7, numbers: [1, 7, 8, 10, 14, 15, 17] },
      { id: "stress", title: "睡眠、壓力與情緒警訊", max: 4, numbers: [2, 3, 4, 16] },
      { id: "function", title: "功能與健康老化警訊", max: 6, numbers: [5, 6, 9, 11, 12, 13] }
    ];

    const sources = [
      ["國健署成人預防保健服務", "https://www.hpa.gov.tw/Pages/List.aspx?nodeid=189"],
      ["健康九九 長者量六力", "https://health99.hpa.gov.tw/health99/ShortHC6/115"],
      ["健康九九 BSRS-5 心情溫度計", "https://health99.hpa.gov.tw/onlineQuiz/bsrs5"],
      ["WHO Healthy ageing and functional ability", "https://www.who.int/news-room/questions-and-answers/item/healthy-ageing-and-functional-ability"],
      ["CDC Sleep", "https://www.cdc.gov/sleep/about/index.html"]
    ];

    const form = document.querySelector("#quizForm");
    const questionRoot = document.querySelector("#questions");
    const result = document.querySelector("#result");
    const notice = document.querySelector("#notice");
    const progressText = document.querySelector("#progressText");
    const progressBar = document.querySelector("#progressBar");

    questions.forEach(question => {
      const field = document.createElement("fieldset");
      field.className = "question";
      field.dataset.name = `q${question.no}`;
      field.innerHTML = `
        <legend class="q-title"><span class="q-no">${question.no}</span><span>${escapeHtml(question.text)}</span></legend>
        <div class="meta">${escapeHtml(question.aspect)}</div>
        <div class="options">
          ${question.options.map(([label, score], index) => `
            <label class="option">
              <input type="radio" name="q${question.no}" value="${index}" data-score="${score}" required>
              <span>${escapeHtml(label)}</span>
            </label>
          `).join("")}
        </div>
      `;
      questionRoot.append(field);
    });

    form.addEventListener("change", updateProgress);
    form.addEventListener("submit", handleSubmit);
    document.querySelector("#resetBtn").addEventListener("click", () => {
      form.reset();
      result.classList.remove("show");
      result.innerHTML = "";
      notice.classList.remove("show");
      document.querySelectorAll(".question.missing").forEach(el => el.classList.remove("missing"));
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    updateProgress();

    function updateProgress() {
      const answered = new FormData(form);
      const count = [...answered.keys()].length;
      progressText.textContent = `已完成 ${count} / ${questions.length}`;
      progressBar.style.width = `${Math.round(count / questions.length * 100)}%`;
      document.querySelectorAll(".question.missing").forEach(el => {
        if (form.querySelector(`input[name="${CSS.escape(el.dataset.name)}"]:checked`)) el.classList.remove("missing");
      });
    }

    function handleSubmit(event) {
      event.preventDefault();
      const missing = [];
      questions.forEach(question => {
        const field = document.querySelector(`.question[data-name="q${question.no}"]`);
        const selected = form.querySelector(`input[name="q${question.no}"]:checked`);
        field.classList.toggle("missing", !selected);
        if (!selected) missing.push(field);
      });

      if (missing.length) {
        notice.classList.add("show");
        missing[0].scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      notice.classList.remove("show");
      const answers = questions.map(question => {
        const selected = form.querySelector(`input[name="q${question.no}"]:checked`);
        const option = question.options[Number(selected.value)];
        return { ...question, answer: option[0], score: option[1] };
      });
      renderResult(answers);
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderResult(answers) {
      const timestamp = new Date().toLocaleString("zh-TW", { hour12: false });
      const categoryResults = categories.map(category => {
        const score = answers
          .filter(answer => category.numbers.includes(answer.no))
          .reduce((sum, answer) => sum + answer.score, 0);
        const [level, message, tone] = interpretCategory(category.id, score);
        return { ...category, score, level, message, tone };
      });
      const safety = answers.find(answer => answer.no === 18);
      const safetyAlert = safety.score > 0;

      result.className = "show";
      result.innerHTML = `
        <div id="resultCapture">
          <div class="result-head">
            <div>
              <h2>檢測結果</h2>
              <div class="timestamp">完成時間：${escapeHtml(timestamp)}</div>
            </div>
            <div class="timestamp">本結果為健康教育自我檢視，不取代醫療診斷。</div>
          </div>
          ${safetyAlert ? `<div class="danger-box">心理安全高優先提醒：第18題大於0。請立即告知可信任的人並儘速尋求心理衛生或醫療協助；若有立即危險，請撥打當地緊急電話或前往急診。</div>` : ""}
          <div class="result-grid">
            ${categoryResults.map(item => `
              <article class="result-card">
                <h3>${escapeHtml(item.title)}</h3>
                <div class="score">${item.score}<small> / ${item.max}</small></div>
                <span class="level ${item.tone}">${escapeHtml(item.level)}</span>
                <p>${escapeHtml(item.message)}</p>
              </article>
            `).join("")}
            <article class="result-card">
              <h3>心理安全高優先提醒</h3>
              <div class="score">${safety.score}<small> / 4</small></div>
              <span class="level ${safetyAlert ? "danger" : ""}">${safetyAlert ? "高優先關懷" : "未回報自殺想法"}</span>
              <p>${safetyAlert ? "第18題不納入一般分項，但只要大於0就需要優先關懷與求助。" : "第18題為0，仍可依其他分項結果提供一般衛教。"}</p>
            </article>
          </div>
          <div class="answer-list">
            <h3>逐題分析</h3>
            ${answers.map(answer => `
              <div class="answer-row">
                <span>${answer.no}</span>
                <span>${escapeHtml(answer.text)}<br><strong>${escapeHtml(answer.answer)}</strong></span>
                <span class="answer-score">
                  <span>${answer.score} 分</span>
                  <span class="answer-analysis">解析：${escapeHtml(answer.analysis)}</span>
                  <span class="answer-analysis">建議：${escapeHtml(answer.advice)}</span>
                </span>
              </div>
            `).join("")}
          </div>
          <div class="disclaimer">注意：上述分項切點為教材用回饋分級，未經正式量表驗證；不得作為診斷、治療或轉介唯一依據。</div>
          <div class="sources">
            <strong>主要出處</strong>
            <ul>
              ${sources.map(([label, url]) => `<li>${escapeHtml(label)}：<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${escapeHtml(url)}</a></li>`).join("")}
            </ul>
          </div>
        </div>
        <div class="download-actions">
          <button class="primary" type="button" id="downloadPngBtn">下載結果 PNG</button>
          <button class="secondary" type="button" id="printBtn">列印／另存 PDF</button>
          <button class="secondary" type="button" id="copyBtn">複製結果文字</button>
        </div>
      `;

      document.querySelector("#downloadPngBtn").addEventListener("click", () => downloadResultPng(categoryResults, safety, timestamp));
      document.querySelector("#printBtn").addEventListener("click", () => window.print());
      document.querySelector("#copyBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(buildPlainText(categoryResults, safety, timestamp));
        document.querySelector("#copyBtn").textContent = "已複製";
        setTimeout(() => document.querySelector("#copyBtn").textContent = "複製結果文字", 1400);
      });
    }

    function interpretCategory(id, score) {
      if (id === "body") {
        if (score <= 1) return ["警訊較少", "目前此面向警訊較少，建議持續定期檢查與維持健康生活型態。", ""];
        if (score <= 3) return ["需留意", "已有數個身體或慢性病相關警訊，建議選擇最明顯的項目先追蹤或調整。", "warn"];
        return ["建議追蹤或諮詢專業", "警訊累積較多，建議整理健檢資料與症狀，諮詢醫療或健康促進專業人員。", "danger"];
      }
      if (id === "stress") {
        if (score <= 1) return ["警訊較少", "目前睡眠、壓力與情緒面向警訊較少，建議持續觀察。", ""];
        if (score === 2) return ["需留意", "已有壓力、睡眠或情緒警訊，建議調整作息、壓力來源與支持系統。", "warn"];
        return ["建議尋求支持或專業諮詢", "警訊明顯，若影響生活、睡眠、人際或工作，建議尋求心理衛生或醫療專業協助。", "danger"];
      }
      if (score <= 1) return ["功能狀態大致穩定", "目前功能與健康老化面向警訊較少，建議持續維持活動、社交與定期檢查。", ""];
      if (score <= 3) return ["有功能或健康老化警訊", "建議針對行動、認知、感官、社交或未來生活規劃進一步檢視。", "warn"];
      return ["建議進一步評估", "警訊累積較多，建議尋求醫療、長者健康、復能、視聽或社區資源評估。", "danger"];
    }

    function buildPlainText(categoryResults, safety, timestamp) {
      const lines = [`健康自我檢測合併去重版結果`, `完成時間：${timestamp}`, ""];
      categoryResults.forEach(item => {
        lines.push(`${item.title}：${item.score}/${item.max}，${item.level}`);
        lines.push(item.message, "");
      });
      lines.push(`心理安全提醒：${safety.score}/4，${safety.score > 0 ? "高優先關懷" : "未回報自殺想法"}`);
      lines.push("本結果為健康教育自我檢視，不取代醫療診斷。");
      return lines.join("\n");
    }

    function downloadResultPng(categoryResults, safety, timestamp) {
      const canvas = document.createElement("canvas");
      const width = 1200;
      const rowHeight = 162;
      const rows = [...categoryResults, { title: "心理安全高優先提醒", score: safety.score, max: 4, level: safety.score > 0 ? "高優先關懷" : "未回報自殺想法", message: safety.score > 0 ? "第18題大於0，請優先尋求協助。" : "第18題為0。", tone: safety.score > 0 ? "danger" : "" }];
      canvas.width = width;
      canvas.height = 250 + rows.length * rowHeight;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#f6f8f5";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      roundRect(ctx, 46, 42, width - 92, canvas.height - 84, 18);
      ctx.fill();
      ctx.fillStyle = "#1f2933";
      ctx.font = "700 40px sans-serif";
      ctx.fillText("健康自我檢測合併去重版結果", 86, 112);
      ctx.font = "24px sans-serif";
      ctx.fillStyle = "#64748b";
      ctx.fillText(`完成時間：${timestamp}`, 86, 154);
      rows.forEach((item, index) => {
        const y = 205 + index * rowHeight;
        ctx.fillStyle = item.tone === "danger" ? "#fee4e2" : "#e5f4ed";
        roundRect(ctx, 86, y, width - 172, 122, 14);
        ctx.fill();
        ctx.fillStyle = "#1f2933";
        ctx.font = "700 26px sans-serif";
        ctx.fillText(item.title, 116, y + 39);
        ctx.fillStyle = item.tone === "danger" ? "#b42318" : "#1f5d48";
        ctx.font = "800 38px sans-serif";
        ctx.fillText(`${item.score}/${item.max}`, 116, y + 92);
        ctx.font = "700 23px sans-serif";
        ctx.fillText(item.level, 270, y + 88);
        ctx.fillStyle = "#64748b";
        ctx.font = "21px sans-serif";
        wrapCanvasText(ctx, item.message, 510, y + 56, 540, 30);
      });
      const link = document.createElement("a");
      link.download = `健康自我檢測合併去重版結果-${new Date().toISOString().slice(0, 10)}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
      let line = "";
      let lineCount = 0;
      for (const char of text) {
        const testLine = line + char;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y + lineCount * lineHeight);
          line = char;
          lineCount += 1;
        } else {
          line = testLine;
        }
        if (lineCount >= 2) break;
      }
      if (line) ctx.fillText(line, x, y + lineCount * lineHeight);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
