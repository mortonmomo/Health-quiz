<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>健康自我檢測</title>
  <style>
    :root { font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif; color: #1f2933; background: #f6f8f5; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f8f5; }
    .box { width: min(680px, calc(100% - 32px)); padding: 24px; border: 1px solid #d9e2dc; border-radius: 12px; background: #fff; box-shadow: 0 14px 40px rgba(30, 56, 43, 0.10); line-height: 1.8; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0; color: #64748b; }
  </style>
</head>
<body>
  <div class="box">
    <h1>健康自我檢測</h1>
    <p>頁面載入中，請稍候。</p>
  </div>
  <script>
    (async () => {
      const sourceUrl = "https://raw.githubusercontent.com/mortonmomo/Health-quiz/14dc934371dc3777917a1039dac3236ec23f855a/index.html";
      try {
        let html = await fetch(sourceUrl, { cache: "no-store" }).then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        });
        html = html
          .replaceAll("健康自我檢測｜合併去重版", "健康自我檢測")
          .replaceAll("18題合併去重版", "18題")
          .replaceAll("健康自我檢測合併去重版結果", "健康自我檢測結果")
          .replaceAll("合併去重版", "");
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.querySelector(".box").innerHTML = `<h1>健康自我檢測</h1><p>頁面載入失敗，請重新整理後再試。</p>`;
        console.error(error);
      }
    })();
  </script>
</body>
</html>
