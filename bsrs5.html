<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>簡式健康表 BSRS-5｜心情溫度計</title>
  <style>
    :root {
      --bg: #f6f8f5;
      --panel: #fff;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d9e2dc;
      --brand: #28745a;
      --brand-dark: #1f5d48;
      --brand-soft: #e5f4ed;
      --warn: #a55418;
      --danger: #b42318;
      --shadow: 0 14px 40px rgba(30, 56, 43, 0.10);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, rgba(40, 116, 90, 0.14), transparent 28rem), linear-gradient(180deg, #f8fbf7 0%, var(--bg) 100%);
    }
    a { color: var(--brand-dark); }
    .page { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    .nav-link { display: inline-flex; width: fit-content; margin-bottom: 14px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; background: #fff; text-decoration: none; font-weight: 700; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; padding: 8px 0 24px; }
    h1 { margin: 0 0 10px; font-size: clamp(28px, 4vw, 44px); line-height: 1.12; }
    h2, h3 { margin: 0; }
    .lead { max-width: 820px; margin: 0; color: var(--muted); font-size: 16px; line-height: 1.8; }
    .summary-chip { display: grid; gap: 5px; min-width: 180px; padding: 14px 16px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.78); box-shadow: var(--shadow); }
    .summary-chip strong { font-size: 24px; }
    .summary-chip span { color: var(--muted); font-size: 13px; }
    .intro, .question, #result { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); box-shadow: var(--shadow); }
    .intro { padding: 20px; margin-bottom: 16px; color: var(--muted); line-height: 1.75; }
    form { display: grid; gap: 16px; }
    .question { display: grid; gap: 14px; padding: 20px; }
    .question.missing { border-color: #d98b45; box-shadow: 0 0 0 3px rgba(217,139,69,.14); }
    .question.safety { border-color: #f2b8b5; background: #fffafa; }
    .q-title { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: start; font-weight: 700; line-height: 1.6; }
    .q-no { min-width: 34px; padding: 2px 8px; border-radius: 99px; color: var(--brand-dark); background: var(--brand-soft); text-align: center; font-size: 13px; }
    .safety .q-no { color: var(--danger); background: #fee4e2; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .option { display: flex; gap: 9px; align-items: flex-start; min-height: 48px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfb; line-height: 1.5; cursor: pointer; }
    .option:has(input:checked) { border-color: var(--brand); background: var(--brand-soft); box-shadow: inset 0 0 0 1px var(--brand); }
    input[type="radio"] { accent-color: var(--brand); margin-top: 4px; }
    .actions, .download-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    button { border: 0; border-radius: 8px; font: inherit; cursor: pointer; }
    .primary, .secondary { padding: 12px 18px; font-weight: 700; }
    .primary { color: #fff; background: var(--brand); }
    .secondary { color: var(--brand-dark); border: 1px solid var(--line); background: #fff; }
    .notice { display: none; margin: 0; color: var(--warn); font-weight: 700; }
    .notice.show { display: block; }
    #result { display: none; margin-top: 24px; padding: 24px; }
    #result.show { display: block; }
    .result-head { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: start; margin-bottom: 18px; }
    .timestamp { color: var(--muted); font-size: 13px; }
    .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .result-card { display: grid; gap: 10px; padding: 16px; border: 1px solid var(--line); border-radius: 10px; background: #fbfcfb; }
    .score { font-size: 38px; font-weight: 800; color: var(--brand-dark); }
    .level { display: inline-flex; width: fit-content; padding: 4px 9px; border-radius: 99px; background: var(--brand-soft); color: var(--brand-dark); font-weight: 700; font-size: 13px; }
    .level.warn { background: #fff1dd; color: var(--warn); }
    .level.danger { background: #fee4e2; color: var(--danger); }
    .result-card p, .answer-list, .disclaimer, .sources { margin: 0; color: var(--muted); line-height: 1.65; }
    .answer-list, .disclaimer, .sources { margin-top: 18px; padding: 16px; border-radius: 10px; background: #f8faf8; font-size: 14px; }
    .answer-list ul, .sources ul { margin: 8px 0 0; padding-left: 20px; }
    .danger-box { margin: 0 0 14px; padding: 16px; border-radius: 10px; background: #fee4e2; color: var(--danger); font-weight: 700; line-height: 1.7; }
    @media (max-width: 760px) { .page { width: min(100% - 22px, 1080px); padding-top: 18px; } header { grid-template-columns: 1fr; } .actions button, .download-actions button { flex: 1; } }
    @media print { body { background: #fff; } header .lead, .summary-chip, form, .download-actions, .nav-link { display: none !important; } .page { width: 100%; padding: 0; } #result { display: block !important; box-shadow: none; border: 0; } }
  </style>
</head>
<body>
  <main class="page">
    <a class="nav-link" href="./">← 回健康自我檢測首頁</a>
    <header>
      <div>
        <h1>簡式健康表 BSRS-5｜心情溫度計</h1>
        <p class="lead">獨立頁面版，評估最近一週，包括今天在內的身心困擾程度。前 5 題計入總分，附加題「有自殺的想法」作為心理安全高優先提醒。</p>
      </div>
      <div class="summary-chip" aria-label="題目總數">
        <strong>5+1 題</strong>
        <span>每題 0–4 分</span>
      </div>
    </header>

    <div class="intro">請回想最近一週，包括今天，依每項困擾程度作答。此工具為心理困擾自我篩檢，結果僅供健康教育與自我覺察參考，不取代精神醫療、心理諮商或其他專業評估。</div>

    <form id="bsrsForm" novalidate>
      <p class="notice" id="notice">還有題目沒填，已幫你標出來了。</p>
      <div id="questions"></div>
      <div class="actions">
        <button class="secondary" type="button" id="resetBtn">清除重填</button>
        <button class="primary" type="submit">送出看結果</button>
      </div>
    </form>

    <section id="result" aria-live="polite"></section>
  </main>

  <script>
    const questions = [
      { no: 1, text: "感覺緊張不安", safety: false },
      { no: 2, text: "覺得容易苦惱或動怒", safety: false },
      { no: 3, text: "感覺憂鬱、心情低落", safety: false },
      { no: 4, text: "覺得比不上別人", safety: false },
      { no: 5, text: "睡眠困難，例如難以入睡、易醒或早醒", safety: false },
      { no: 6, text: "附加題：有自殺的想法", safety: true }
    ];

    const options = [
      ["0 完全沒有", 0],
      ["1 輕微", 1],
      ["2 中等程度", 2],
      ["3 厲害", 3],
      ["4 非常厲害", 4]
    ];

    const form = document.querySelector("#bsrsForm");
    const questionRoot = document.querySelector("#questions");
    const result = document.querySelector("#result");
    const notice = document.querySelector("#notice");

    questions.forEach(question => {
      const field = document.createElement("fieldset");
      field.className = `question${question.safety ? " safety" : ""}`;
      field.dataset.name = `q${question.no}`;
      field.innerHTML = `
        <legend class="q-title"><span class="q-no">${question.safety ? "附" : question.no}</span><span>${escapeHtml(question.text)}</span></legend>
        <div class="meta">${question.safety ? "此題不納入前五題總分；只要大於 0，就應優先尋求支持或專業協助。" : "請依最近一週，包括今天在內的困擾程度作答。"}</div>
        <div class="options">
          ${options.map(([label, score], index) => `
            <label class="option"><input type="radio" name="q${question.no}" value="${index}" data-score="${score}" required><span>${escapeHtml(label)}</span></label>
          `).join("")}
        </div>
      `;
      questionRoot.append(field);
    });

    form.addEventListener("submit", handleSubmit);
    form.addEventListener("change", event => {
      const fieldset = event.target.closest(".question");
      if (fieldset) fieldset.classList.remove("missing");
    });
    document.querySelector("#resetBtn").addEventListener("click", () => {
      form.reset();
      result.classList.remove("show");
      result.innerHTML = "";
      notice.classList.remove("show");
      document.querySelectorAll(".question.missing").forEach(el => el.classList.remove("missing"));
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function handleSubmit(event) {
      event.preventDefault();
      const missing = [];
      questions.forEach(question => {
        const field = document.querySelector(`.question[data-name="q${question.no}"]`);
        const selected = form.querySelector(`input[name="q${question.no}"]:checked`);
        field.classList.toggle("missing", !selected);
        if (!selected) missing.push(field);
      });
      if (missing.length) {
        notice.classList.add("show");
        missing[0].scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }
      notice.classList.remove("show");
      renderResult(readAnswers());
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function readAnswers() {
      return questions.map(question => {
        const selected = form.querySelector(`input[name="q${question.no}"]:checked`);
        const option = options[Number(selected.value)];
        return { ...question, answer: option[0], score: option[1] };
      });
    }

    function interpret(score) {
      if (score <= 5) return { level: "身心適應狀況良好", tone: "", message: "前五題總分 0–5 分，整體身心適應狀況較穩定，建議持續維持規律作息與支持系統。" };
      if (score <= 9) return { level: "輕度情緒困擾", tone: "warn", message: "前五題總分 6–9 分，可能有輕度情緒困擾，建議調整壓力來源、睡眠與生活節奏，並尋求支持。" };
      if (score <= 14) return { level: "中度情緒困擾", tone: "danger", message: "前五題總分 10–14 分，可能有中度情緒困擾，若已影響生活、工作、人際或睡眠，建議尋求心理健康或醫療專業協助。" };
      return { level: "重度情緒困擾", tone: "danger", message: "前五題總分 15 分以上，可能有重度情緒困擾，建議儘速尋求心理健康或醫療專業協助。" };
    }

    function renderResult(answers) {
      const timestamp = new Date().toLocaleString("zh-TW", { hour12: false });
      const mainScore = answers.filter(item => !item.safety).reduce((sum, item) => sum + item.score, 0);
      const safety = answers.find(item => item.safety);
      const safetyAlert = safety.score > 0;
      const summary = interpret(mainScore);
      result.className = "show";
      result.innerHTML = `
        <div id="resultCapture">
          <div class="result-head">
            <div>
              <h2>檢測結果</h2>
              <div class="timestamp">完成時間：${escapeHtml(timestamp)}</div>
            </div>
            <div class="timestamp">本結果為健康教育自我檢視，不取代醫療診斷。</div>
          </div>
          ${safetyAlert ? `<div class="danger-box">心理安全高優先提醒：附加題「有自殺的想法」大於 0。請立即告知可信任的人並儘速尋求心理衛生或醫療協助；若有立即危險，請撥打當地緊急電話或前往急診。</div>` : ""}
          <div class="result-grid">
            <article class="result-card">
              <h3>BSRS-5 前五題總分</h3>
              <div class="score">${mainScore}<small> / 20</small></div>
              <span class="level ${summary.tone}">${escapeHtml(summary.level)}</span>
              <p>${escapeHtml(summary.message)}</p>
            </article>
            <article class="result-card">
              <h3>心理安全高優先提醒</h3>
              <div class="score">${safety.score}<small> / 4</small></div>
              <span class="level ${safetyAlert ? "danger" : ""}">${safetyAlert ? "需要優先關懷" : "未回報自殺想法"}</span>
              <p>${safetyAlert ? "附加題不納入前五題總分，但只要大於 0，就應優先尋求支持與專業協助。" : "附加題為 0，仍可依前五題結果進行一般衛教與自我照顧。"}</p>
            </article>
          </div>
          <div class="answer-list">
            <strong>逐題分數</strong>
            <ul>
              ${answers.map(item => `<li>${item.safety ? "附加題" : `第 ${item.no} 題`}：${escapeHtml(item.text)}｜${escapeHtml(item.answer)}｜${item.score} 分</li>`).join("")}
            </ul>
          </div>
          <div class="disclaimer">注意：BSRS-5 為心理困擾篩檢工具，不等於精神疾病診斷。若分數偏高、症狀持續，或附加題大於 0，應儘速尋求心理衛生、醫療或可信任支持。</div>
          <div class="sources"><strong>資料依據</strong><ul><li>簡式健康表 BSRS-5：最近一週，包括今天，每題 0–4 分；前五題 0–5 分為身心適應狀況良好、6–9 分為輕度情緒困擾、10–14 分為中度情緒困擾、15 分以上為重度情緒困擾；附加題「有自殺的想法」若有任何分數，應儘速尋求專業協助。</li></ul></div>
        </div>
        <div class="download-actions">
          <button class="secondary" type="button" id="printBtn">列印／另存 PDF</button>
          <button class="secondary" type="button" id="copyBtn">複製結果文字</button>
        </div>
      `;
      document.querySelector("#printBtn").addEventListener("click", () => window.print());
      document.querySelector("#copyBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(buildPlainText(mainScore, safety, summary, timestamp));
        document.querySelector("#copyBtn").textContent = "已複製";
        setTimeout(() => document.querySelector("#copyBtn").textContent = "複製結果文字", 1400);
      });
    }

    function buildPlainText(mainScore, safety, summary, timestamp) {
      return [
        "簡式健康表 BSRS-5 心情溫度計結果",
        `完成時間：${timestamp}`,
        `前五題總分：${mainScore}/20，${summary.level}`,
        summary.message,
        `附加題有自殺的想法：${safety.score}/4，${safety.score > 0 ? "需要優先關懷" : "未回報自殺想法"}`,
        "本結果為健康教育自我檢視，不取代醫療診斷。"
      ].join("\n");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
